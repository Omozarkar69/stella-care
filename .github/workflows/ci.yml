name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Soroban contracts ────────────────────────────────────────────────────────
  contracts:
    name: Contracts (build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-care/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('stellar-care/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build contracts
        working-directory: stellar-care
        run: stellar contract build

      - name: Run contract tests
        working-directory: stellar-care
        run: cargo test --workspace

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stellar-care/frontend/package-lock.json

      - name: Install dependencies
        working-directory: stellar-care/frontend
        run: npm ci

      - name: Type-check
        working-directory: stellar-care/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: stellar-care/frontend
        run: npm run build
        env:
          VITE_POOL: ${{ secrets.VITE_POOL }}
          VITE_CARE: ${{ secrets.VITE_CARE }}
          VITE_HC: ${{ secrets.VITE_HC }}
          VITE_CV: ${{ secrets.VITE_CV }}
          VITE_RPC: https://soroban-testnet.stellar.org
          VITE_HORIZON: https://horizon-testnet.stellar.org
          VITE_PASSPHRASE: "Test SDF Network ; September 2015"
