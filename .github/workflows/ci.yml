name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Soroban contracts ────────────────────────────────────────────────────────
  contracts:
    name: Contracts (build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install stellar-cli (pre-built binary)
        run: |
          curl -sSL -o stellar-cli.tar.gz \
            https://github.com/stellar/stellar-cli/releases/download/v26.0.0/stellar-cli-26.0.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf stellar-cli.tar.gz -C /usr/local/bin
          stellar --version

      - name: Build contracts
        run: stellar contract build

      - name: Run contract tests
        run: cargo test --workspace

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_POOL: ${{ secrets.VITE_POOL }}
          VITE_CARE: ${{ secrets.VITE_CARE }}
          VITE_HC: ${{ secrets.VITE_HC }}
          VITE_CV: ${{ secrets.VITE_CV }}
          VITE_RPC: https://soroban-testnet.stellar.org
          VITE_HORIZON: https://horizon-testnet.stellar.org
          VITE_PASSPHRASE: "Test SDF Network ; September 2015"
